completion_level: integrated_runtime
# 允许值（由浅到深，必须声明当前 WI 的实际完成深度）：
# - fixture_contract: fixture / mock / 空壳接口通过，核心逻辑未实现
# - in_memory_domain: 内存中领域逻辑可运行，未连接外部依赖
# - api_connected: 已连接真实外部依赖，但未持久化
# - db_persistent: 数据已持久化，但未在真实运行时集成
# - integrated_runtime: 在真实运行时环境中集成运行通过
# - owner_verified: 产品/需求方已验证确认

