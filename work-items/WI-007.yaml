  - "python -m compileall src/velentrade"

stop_conditions:
  - "目标、边界、验收或测试用例不清楚"
  - "需要修改 forbidden_paths 或超出 allowed_paths"
  - "实现需要改变 spec.md / design.md 的产品或架构口径"
  - "需要绕过 hard dissent、行动强度阈值、低共识阻断或进入 CIO/Risk/Owner/执行范围"
reopen_triggers:
  - "Analyst role_payload schema、共识公式、action_conviction 阈值、辩论轮次/输入输出规则或 hard dissent 风控交接口径变化"
  - "任何真实交易、真实券商或回测能力被要求进入本 WI"
