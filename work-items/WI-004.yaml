wi_id: WI-004
phase_scope: Implementation
completion_level: api_connected

goal: "交付简体中文高端浅色卡面 Web 工作台的 Owner 决策视图、投资 Dossier、治理下 Agent 团队工作区、命令层、任务中心、审批中心和知识/记忆工作台。"
derived_from: design.md#7
design_refs:
  - design-appendices/frontend-workbench-design.md
  - contracts/api-read-models.md
  - contracts/domain-artifact-schemas.md
  - contracts/verification-report-schemas.md

requirement_refs:
  - REQ-006
  - REQ-007
acceptance_refs:
  - ACC-006
  - ACC-007
verification_refs:
  - VO-006
  - VO-007
test_case_refs:
  - TC-ACC-006-01
  - TC-ACC-007-01

r8_runbook_scope:
  owns:
    - "Frontend implementation of the R8 previewed workbench: Owner Decision View, Investment Dossier View, Trace/Debug View, Task Center, Approval Center, manual_todo, finance/knowledge/governance navigation surfaces."
    - "Chinese premium light card UI and main navigation: 全景 / 投资 / 财务 / 知识 / 治理; Agent 团队 is a Governance secondary workspace, not a top-level menu."
    - "Governance Agent team workspace frontend for nine Agent cards, Agent profile detail, version/quality/denied-action display, and Agent capability draft submission."
    - "UI/read-model presentation of Agent collaboration, MemoryCollection, MemoryItem relation graph, Context injection inspector, stage guards, risk blocks, Owner exception packets, DevOps health, and governance effective-scope boundaries."
    - "Design preview parity checks against `design-previews/frontend-workbench/` for the pages and states needed by TC-ACC-006-01 and TC-ACC-007-01."
  must_prove:
    - "Owner default views show decision-ready summaries and blocked actions, not raw long transcripts."
    - "Risk rejected, non-A asset trade attempts, execution_core blocked, and Owner timeout states render disabled actions with reason codes."
    - "Team capability edits create AgentCapabilityChangeDraft/Governance Change only and do not display hot-patch controls for in-flight AgentRun."
    - "Knowledge page can show memory capture/review/digest/organize surfaces, relation graph and DefaultContext proposal path without directly activating context."
    - "Trace/Debug exposes CollaborationCommand/Event/Handoff lineage and ContextSlice memory injection/denial records for audit without becoming the primary Owner view."
  does_not_own:
    - "Backend workflow transitions, AgentRun execution, domain guard decisions, investment calculations, paper execution, or DevOps incident state changes."

execution_slices:
  - slice_id: fixture_first_frontend
    dependency_refs:
      - WI-001
      - WI-002
    scope: "基于 frozen read model contract、design preview fixture 和 WI-001/WI-002 的基础 registry/workflow/context shape，先实现页面、路由、状态展示、禁用入口和 report writer。"
    verification_refs:
      - TC-ACC-006-01
      - TC-ACC-007-01
    note: "Playwright/E2E 在本切片使用 read model fixture 或 mock adapter；不得等待完整投资执行链才开始 UI 实现。"
  - slice_id: downstream_real_read_models
    dependency_refs:
      - WI-003
      - WI-007
      - WI-008
      - WI-009
      - WI-005
      - WI-006
    scope: "各 domain WI 完成后，把 fixture/mock adapter 切换到真实 API/read model，补真实跨域 E2E 证据。"
    verification_refs:
      - TC-ACC-006-01
      - TC-ACC-007-01
    note: "此切片是集成收口条件，不是 WI-004 启动前置条件。"

scope:
  - "实现 `全景 / 投资 / 财务 / 知识 / 治理` 主导航、简体中文高端浅色卡面、全局命令层、Request Brief preview、Owner Decision View、Investment Dossier、Trace/Debug View、治理下 Agent 团队工作区、Task Center、Approval Center 和 Knowledge/Memory 工作台。"
  - "按 `contracts/api-read-models.md` 实现页面 read model adapter 或 fixture mock，不在前端推进业务状态。"
  - "实现 Knowledge 页 MemoryCollection、MemoryItem 列表/详情、relation graph、organize suggestion、Context injection inspector 和跳转 Governance Proposal 的 DefaultContext 更新入口；不得在前端直接生效 DefaultContext。"
  - "实现 Team 页九个 Agent 卡面、AgentProfile 详情、Prompt/Skill/ContextSnapshot 版本、工具权限、近期产物质量、失败/越权记录和 AgentCapabilityConfig 草案入口；草案保存只能进入 Governance Change。"
  - "实现 confirmation、approval、manual_todo 分离，以及 Risk rejected、非 A 股交易、低共识、execution_core 阻断和 Agent 能力热改的 UI 禁止入口。"
  - "生成 web_command_routing_report、governance_task_report 和 team_capability_config_report。"
out_of_scope:
  - "不在前端推进业务状态、不实现后端 workflow、不接飞书/移动端/邮件/短信、不展示长聊天 transcript 作为默认 Owner 视图。"

allowed_paths:
  - frontend/**
  - tests/frontend/**
  - tests/e2e/**
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md
  - Dockerfile

dependency_refs:
  - WI-001
  - WI-002
dependency_type: strong
contract_refs:
  - contracts/api-read-models.md
  - contracts/domain-artifact-schemas.md
  - contracts/verification-report-schemas.md

required_verification:
  - "npm --prefix frontend test"
  - "npm --prefix frontend run build"
  - "pytest tests/e2e -q"

stop_conditions:
  - "目标、边界、验收或测试用例不清楚"
  - "需要修改 forbidden_paths 或超出 allowed_paths"
  - "实现需要改变 spec.md / design.md 的产品或架构口径"
  - "需要飞书、移动端、邮件、短信或真实交易入口"
  - "前端实现必须等待完整投资链真实后端才能开始，且无法用 read model fixture 覆盖 TC-ACC-006/007"
reopen_triggers:
  - "主导航、中文高端浅色卡面、治理下 Agent 团队工作区、Agent 能力配置草案、三层可视化、Knowledge/Memory 工作台、任务/审批隔离、Trace/Debug 默认可见性或 Owner 审批材料规则变化"
  - "前端必须依赖未设计 API 或需要改变后端契约"
