r8_runbook_scope:
  owns:
    - "Finance profile and non-A asset runbooks from Owner input to planning/risk/manual_todo projection."
    - "Performance attribution and CFO interpretation runbooks, including anomaly/cycle triggers, GovernanceProposal, ReflectionAssignment, and report publication."
    - "Researcher MemoryCapture/MemoryOrganizeSuggestion, Knowledge, Prompt, SkillPackage, factor research, and reflection promotion runbooks with impact triage, validation, rollback, and new task/new attempt effective scope."
  must_prove:
    - "Non-A assets cannot enter approval, execution, or trade chains and only project planning/risk/manual_todo outputs."
    - "Routine attribution is service-published; CFO LLM work is triggered only by anomaly, cycle, governance proposal, or reflection assignment rules."
    - "Researcher can capture, review, digest, organize and propose promotion for memory, but cannot treat Memory as business fact source."
    - "Researcher and responsible Agent proposals cannot hot-edit in-flight ContextSnapshot, Prompt, SkillPackage, DefaultContext, risk budget, factor weight, or execution parameter."
  does_not_own:
    - "A-share IC decision, Risk Review, paper execution, production frontend rendering, DevOps recovery, or base Authority Gateway implementation."

execution_slices:
  - slice_id: finance_boundary
    dependency_refs:
      - WI-001
      - WI-002
    scope: "先交付 FinanceProfile、财务敏感字段例外、非 A 股交易隔离、planning/risk/manual_todo projection 和 finance_asset_boundary_report。"
    test_case_refs:
      - TC-ACC-023-01
  - slice_id: researcher_knowledge_proposals
    dependency_refs:
      - WI-001
      - WI-002
    scope: "先交付 Researcher daily brief/research package/topic proposal fixture、MemoryCapture、MemoryOrganizeSuggestion、Knowledge/Prompt/Skill proposal 和 researcher_workflow_report；TopicProposal 与 IC Context 连接可先使用 contract fixture，待 WI-003 完成后接真实 read model。"
    test_case_refs:
      - TC-ACC-027-01
  - slice_id: attribution_cfo_reflection
    dependency_refs:
      - WI-003
      - WI-007
      - WI-008
      - WI-009
    scope: "后置接入完整投资链 artifact，交付 Performance Attribution、CFO Interpretation/Governance/ReflectionAssignment、Factor Research Governance、Reflection Workflow 和对应报告。"
    test_case_refs:
      - TC-ACC-024-01
      - TC-ACC-025-01
      - TC-ACC-026-01
      - TC-ACC-028-01
    note: "本切片可先用 frozen contract fixture 开发算法和 report writer；真实跨 WI 集成在下游投资链完成后收口。"

scope:
  - "实现 Finance Profile、财务敏感字段例外、非 A 股交易隔离、Performance Attribution & Evaluation、CFO Interpretation、Governance Proposal、Reflection Assignment、Factor Research Governance、Researcher Workflow、MemoryCapture、MemoryOrganizeSuggestion、Knowledge/Prompt/Skill Proposal 和 Reflection Workflow。"
  - "覆盖财务规划、基金黄金行情边界、房产手工估值、自动归因、CFO 高影响治理、记忆 capture/review/digest/organize、知识状态机、Prompt/Skill 低中影响自动验证和高影响 Owner 审批后的新任务/新 attempt 生效。"
  - "实施顺序按 execution_slices 推进：finance_boundary 与 researcher_knowledge_proposals 可在 WI-001/WI-002 后启动；attribution_cfo_reflection 的真实跨域集成等待 WI-003/WI-007/WI-008/WI-009，但算法、schema guard 和 report writer 可先使用 contract fixture。"
  - "固化 FinanceProfile、AttributionReport、CFOInterpretation、GovernanceProposal、MemoryCapture、MemoryOrganizeSuggestion、Knowledge/Prompt/SkillProposal 和 ReflectionRecord 的 schema/guard。"
  - "生成 finance_asset_boundary_report、performance_attribution_report、cfo_governance_report、factor_research_report、researcher_workflow_report、reflection_learning_report。"
out_of_scope:
  - "不把非 A 股资产接入审批、执行或交易链，不直接热改 Prompt、风险预算、因子权重或执行参数。"
  - "不实现 Performance Analyst Agent。"

