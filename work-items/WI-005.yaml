stop_conditions:
  - "目标、边界、验收或测试用例不清楚"
  - "需要修改 forbidden_paths 或超出 allowed_paths"
  - "实现需要改变 spec.md / design.md 的产品或架构口径"
  - "需要非 A 股交易、Performance Analyst Agent 或反思直接热改运行参数"
  - "早期 finance/researcher 切片无法用 contract fixture 与基础 workflow/context 运行，必须等待完整投资执行链"
reopen_triggers:
  - "财务边界、财务敏感字段例外、归因维度、CFO 治理职责、研究员边界、Memory capture/organize、知识/Prompt/Skill 生效规则或反思链路变化"
  - "高影响变更不再需要 Owner 审批或需要影响在途任务"
