r8_runbook_scope:
  owns:
    - "Generic workflow spine from Request Brief to TaskEnvelope, stage guard, service/AgentRun admission, artifact, handoff, read model projection, and verification report."
    - "Data/service/governance runbooks including quality scoring, fallback/cache/conflict, service failure, ContextSnapshot activation, and DefaultContextBinding/MemoryCollection version activation."
    - "Generic service orchestration call path for Decision Service, without implementing S4 decision semantics owned by WI-008."
    - "Celery worker scheduling for `start_agent_run`, including runner unavailable, timeout, idempotency and no fabricated Agent artifact."
  must_prove:
    - "Stage state changes only through domain command handlers and guards."
    - "Service failures do not fabricate results and execution_core blocked cannot be overridden."
    - "Governance changes, including MemoryCollection/KnowledgeItem/DefaultContextBinding and AgentCapability changes, affect only new task/new attempt snapshots."
    - "Worker can dispatch accepted AgentRun records to agent-runner and persist only runner results that pass Authority Gateway/domain guard validation."
  does_not_own:
    - "Role-specific investment Agent memo content, Decision Service domain semantics, frontend production UI, or finance/reflection business workflows."

scope:
  - "实现 Request Brief confirmation、Task Envelope、S0-S7 阶段节点、Reopen Event、ContextSnapshot、DefaultContextBinding/MemoryCollection/AgentCapability 版本纳入快照、高影响治理状态机、低/中影响自动验证生效链、transition guard、incident 状态机和 Celery `start_agent_run` 调度。"
  - "实现 Data Domain Registry、Source Registry、Data Request、Data Readiness Report、completeness/accuracy/timeliness quality gate、fallback、cache、conflict report、execution_core freshness gate、service orchestration 和 market state 默认生效。"
  - "实现许可安全的公开 HTTP CSV 行情 adapter、真实源 Source Registry 元数据、字段归一化、限频/许可声明、fallback/cache 降级和 execution_core 阻断；自动化验证使用本地 HTTP/假传输，不把外网 live provider 可用性伪装成 pass。"
  - "固化 workflow command guard、Data Request/Readiness schema、服务输出无治理权、Decision Service 调用不越权、ContextSnapshot hash/immutability、Memory/Knowledge/DefaultContext/AgentCapability 新版本绑定和新任务/新 attempt 生效边界。"
  - "生成 s0_s7_workflow_report、data_quality_degradation_report、service_boundary_report、market_state_report、config_governance_report，并在相关报告中记录 runner 调度失败不会伪造 Agent artifact。"
out_of_scope:
  - "不实现具体 A 股 IC 决策、DecisionPacket/偏离守卫语义、前端页面、财务知识链、DevOps health 页面、付费/需密钥供应商 adapter、真实券商或真实下单 adapter。"
  - "不修改 WI-001 已交付核心 schema 的语义，除非回到 Design。"

