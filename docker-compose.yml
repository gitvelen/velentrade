services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: velentrade
      POSTGRES_PASSWORD: velentrade
      POSTGRES_DB: velentrade
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velentrade -d velentrade"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "6379:6379"

  api:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      VELENTRADE_DATABASE_URL: postgresql+psycopg://velentrade:velentrade@postgres:5432/velentrade
      VELENTRADE_REDIS_URL: redis://redis:6379/0
      VELENTRADE_AGENT_RUNNER_URL: http://agent-runner:8100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-runner:
        condition: service_started
    command: >
      bash -lc "pip install -e . &&
      alembic upgrade head &&
      uvicorn --factory velentrade.api.app:build_app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  agent-runner:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      VELENTRADE_DATABASE_URL: postgresql+psycopg://velentrade:velentrade@postgres:5432/velentrade
      VELENTRADE_REDIS_URL: redis://redis:6379/0
      VELENTRADE_AGENT_RUNNER_URL: http://agent-runner:8100
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "pip install -e . &&
      alembic upgrade head &&
      uvicorn --factory velentrade.agent_runner.service:build_agent_runner_app --host 0.0.0.0 --port 8100"
    ports:
      - "8100:8100"

  worker:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      VELENTRADE_DATABASE_URL: postgresql+psycopg://velentrade:velentrade@postgres:5432/velentrade
      VELENTRADE_REDIS_URL: redis://redis:6379/0
      VELENTRADE_AGENT_RUNNER_URL: http://agent-runner:8100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-runner:
        condition: service_started
    command: >
      bash -lc "pip install -e . &&
      alembic upgrade head &&
      celery -A velentrade.worker.celery_runtime:celery_app worker --loglevel=INFO"

  beat:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      VELENTRADE_DATABASE_URL: postgresql+psycopg://velentrade:velentrade@postgres:5432/velentrade
      VELENTRADE_REDIS_URL: redis://redis:6379/0
      VELENTRADE_AGENT_RUNNER_URL: http://agent-runner:8100
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    command: >
      bash -lc "pip install -e . &&
      alembic upgrade head &&
      celery -A velentrade.worker.celery_runtime:celery_app beat --loglevel=INFO"

volumes:
  postgres-data:
